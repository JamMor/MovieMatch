    {% extends "base.html" %}
    {% load static %}

    {% block content_block %}
        <main>
            <div class="container">
                <div id="search-container">
                    <nav id="search-bar" class="grey darken-4">
                        <div class="nav-wrapper">
                            <form class="ajax-form">
                                <div id="moviesearch" class="input-field">
                                    <input class="neon-cyan neon-glow-focus" type="search" id="moviesearch-input" placeholder="Movie Search" required>
                                    <label class="label-icon" for="moviesearch-input"><i class="material-icons">theaters</i></label>
                                    <i id="search-close" class="material-icons">close</i>
                                </div>
                                <div id="list-actions-btn" class="fixed-action-btn">
                                    <a class="btn-floating btn-large neon-purple neon-glow-hover">
                                        <i class="large material-icons">more_vert</i>
                                    </a>
                                    <ul>
                                        <li><a id="clear-movie-list" class="btn-floating neon-orange neon-glow-hover"><i class="material-icons">close</i></a></li>
                                        <li><a id="add-from-list" class="btn-floating neon-cyan neon-glow-hover"><i class="material-icons">playlist_add</i></a></li>
                                    </ul>
                                </div>
                            </form>
                        </div>
                    </nav>
                    <div id="search-results" class="carousel carousel-slider"></div>
                </div>
                {% block list_builder_subheading %}
                {% endblock %}
                <div id="movie_list"></div>
            </div>
        </main>

    {% endblock %}

    {% block script_block %}
        {{ block.super }}
        <script type="module" src="{% static 'list_builder/js/list_builder/index.js'%}"></script>
    {% endblock %}
