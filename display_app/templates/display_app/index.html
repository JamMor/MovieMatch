<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    {% load static %}
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'display_app/Favicon/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'display_app/Favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'display_app/Favicon/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'display_app/Favicon/site.webmanifest' %}">
    <link rel="mask-icon" href="{% static 'display_app/Favicon/safari-pinned-tab.svg" color="#ff00f7' %}">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#090909">
    <!--  -->
    <title>MovieMatch</title>
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.6.0.js"></script>
    <script src="https://code.jquery.com/ui/1.13.1/jquery-ui.js"
        integrity="sha256-6XMVI0zB8cRzfZjqKcD01PBsAy3FlDASrlC8SxCpInY=" crossorigin="anonymous">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<!--  -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.1/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'display_app/css/style.css' %}">
</head>

<body>
    {% csrf_token %}
    <main>
        <div class="container">
            <nav id="search-bar" class="grey darken-4">
                <div class="nav-wrapper">
                    <form id="search-form">
                        <div id="moviesearch" class="input-field">
                            <input type="search" id="moviesearch-input" placeholder="Movie Search" required>
                            <label class="label-icon" for="moviesearch-input"><i class="material-icons">local_movies</i></label>
                            <i id="search-close" class="material-icons">close</i>
                        </div>
                    </form>
                </div>
            </nav>
            <div id="search-results" class="carousel carousel-slider"></div>
            <hr>
            <div id="movie_list"></div>
        </div>
        <!-- <div>Spanning Share button</div> -->
    </main>
        <div class="fixed-action-btn toolbar">
            <a class="btn-floating btn-large cyan accent-2">
                <i class="large material-icons indigo-text text-darken-4">arrow_back</i>
            </a>
            <ul>
                <li class="waves-effect waves-light"><a class="modal-trigger" href="#share_modal"><i class="material-icons indigo-text text-darken-4">present_to_all</i></a></li>
                <li class="disabled"><a href="#!"><i class="material-icons indigo-text text-darken-4">save</i></a></li>
                <li class="waves-effect waves-light"><a href="#!"><i class="material-icons indigo-text text-darken-4">close</i></a></li>
            </ul>
        </div>
        <div id="share_modal" class="modal cyber-grade">
            <div class="modal-content pink-text text-darken-2">
                <h4>Ready to share?</h4>
                <form action="#" class="ajax-form">
                    <div class="input-field">
                        <input id="nickname" type="text">
                        <label for="nickname">Nickname</label>
                    </div>
                    <p class="flow-text">Enter sharecode if you have one.</p>
                    <div class="input-field">
                        <input id="sharecode" type="text" style="text-transform:uppercase" data-length="8">
                        <label for="sharecode">Sharecode</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <a id="share-btn" href="#" class="neon-blue-hover waves-effect waves-light btn-large">Share</a>
                <a href="#!" class="modal-close orange-text text-darken-3 waves-effect waves-dark btn-flat">Cancel</a>
            </div>
        </div>
    <script type="text/javascript">
        var DJ_STATIC_FILES = {
           "placeholder_path": "{% static 'display_app/images/movie_placeholder.png' %}"
        };
    </script>
    <script src="{% static 'display_app/js/index.js'%}"></script>
</body>

</html>
