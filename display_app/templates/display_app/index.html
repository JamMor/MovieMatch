<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.6.0.js"></script>
    <script src="https://code.jquery.com/ui/1.13.1/jquery-ui.js"
        integrity="sha256-6XMVI0zB8cRzfZjqKcD01PBsAy3FlDASrlC8SxCpInY=" crossorigin="anonymous">
    </script>

    {% load static %}
    <script src="{% static 'display_app/js/index.js'%}"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.1/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'display_app/css/style.css' %}">
</head>

<body>
    {% csrf_token %}
    <header>
        <h3>Welcome, Possible User!</h3>
        <a href="">Login</a>
        <a href="">Register</a>
        <a href="">Logout</a>
    </header>
    <main>
        <p>Hello!</p>
        <div id="searchbox" class="ui-widget ui-front">
            <input class="ui-autocomplete-input" type="search" name="searchbar" id="searchbar"
                placeholder="Search for a movie...">
        </div>
        <div class="inline input-field">
            <input type="text" name="sharecode" id="sharecode" placeholder="Enter share code here...">
            <input type="text" name="nickname" id="nickname" placeholder="Nickname">
        </div>
        <button id="share">Share/Add</button>
        <button id="clear">Clear</button>
        <div class="inline input-field">
            <input type="text" name="savelist" id="savelist" placeholder="Enter list name...">
            <button id="save">Save</button>
        </div>
        <div id="shared_users"></div>
        <div id="shared_list"></div>
        <hr>
        <div id="user_list"></div>
        <div id="movie_info"></div>

    </main>
</body>

</html>
