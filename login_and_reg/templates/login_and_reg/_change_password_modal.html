<div id="change-password-modal" class="modal cyber-grade">
    <div class="modal-content pink-text text-darken-2">
        <h5>Verify your old password, and then enter your new one.</h5>
        <form id="change-password-form" action="{% url 'login_and_reg:change_password' %}" method="POST">
            {% csrf_token %}
            {% include "form_template.html" with form=change_password_form %}
        </form>
    </div>
    <div class="modal-footer">
        <button type="submit" form="change-password-form" id="change-password-confirm"
                class="neon-cyan neon-glow neon-hover waves-effect waves-light btn-large btn-rounded">
            <i class="material-icons left">lock_open</i>Submit
        </button>
        <button type="button" class="modal-close orange-text text-darken-3 waves-effect waves-dark btn-flat">
            <i class="material-icons left orange-text text-darken-3">close</i>Cancel
        </button>
    </div>
</div>
