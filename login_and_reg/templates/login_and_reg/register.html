{% extends "base.html" %}

{% block content_block %}
    <main class="container">
        <form class ="cyber-grade" action="{% url 'login_and_reg:register' %}" method="post">
            {% csrf_token %}
            {% for field in user_form %}
            <div class="input-field">
                {{ field.label_tag }} {{ field }}
                {% if field.help_text %}
                <p class="help">{{ field.help_text|safe }}</p>
                {% endif %}
                {{ field.errors }}
            </div>
        {% endfor %}
            <button type="submit">Submit</button>
        </form>
    </main>
{% endblock %}
