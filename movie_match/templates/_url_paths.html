<!-- //This contains a list of internal urls that are used in the javascript files. -->
<script type="text/javascript">
    var urlPath = {
        "defaultRedirect" : "{% url 'list_builder:default_redirect' %}",
        //list_builder
        "listCreator" : "{% url 'list_builder:list_builder' %}",
        "listManager" : "{% url 'list_builder:list_manager' %}",
        "saveList" : (list_id = "") => {
            let saveURL = "/save"
            if (list_id) {saveURL += `/${list_id}`}
            return saveURL
        },
        "listEditor" : (list_id) => {
            let editUrl = "/edit"
            return `${editUrl}/${list_id}`
        },
        "deleteList" : (list_id) => {
            let deleteListUrl = "/delete"
            return `${deleteListUrl}/${list_id}`
        },
        "getList" : (list_id) => {
            let getListUrl = "/get"
            return `${getListUrl}/${list_id}`
        },
        "getListsOverview" : (pageNumber=1, field="updated-at", order="desc") => {
            const baseGetListsOverviewUrl = "/get-overview"
            return `${baseGetListsOverviewUrl}/?page=${pageNumber}&sort=${field}:${order}`
        },
        //elimination_room
        "shareSubmit" : "{% url 'elimination_room:share_submit' %}",
        "eliminationRoom" : (sharecode) => {
            let baseUrl = "/match"
            return `${baseUrl}/${sharecode}`
        },
        "webSocketURL" : (shareCode = "") => {
            let webSocketProtocol = "{% if IN_DEBUG %}ws://{% else %}wss://{% endif %}"
            let baseURL = window.location.host
            let socketRootURL = "ws/match"
    
            return `${webSocketProtocol}${baseURL}/${socketRootURL}/${shareCode}/`
        },
        //login_and_reg
        "register" : "{% url 'login_and_reg:register' %}",
        "login" : "{% url 'login_and_reg:login' %}",
        "logout" : "{% url 'login_and_reg:logout' %}",
        "accountSettings" : "{% url 'login_and_reg:settings' %}",
        "changeNickname" : "{% url 'login_and_reg:change_nickname' %}",
        "changePassword" : "{% url 'login_and_reg:change_password' %}",
        "deleteAccount" : "{% url 'login_and_reg:delete_account' %}",
    };
</script>
