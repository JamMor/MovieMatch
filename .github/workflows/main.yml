name: S3 Test

on:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  
permissions:
  contents: read
  id-token: write

jobs:
  tester:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        role-session-name: MovieMatchS3Test
        aws-region: ${{ env.AWS_REGION }}
      
    - name: AWSCopy
      run: |
        aws s3 cp ./Docker/docker-compose.deploy.yml s3://deploy-instructions/moviematch/docker-compose.yml
