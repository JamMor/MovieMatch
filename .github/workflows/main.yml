name: S3 Test

on:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: moviematch
  IMAGE_TAG: 7fedd2a9b471580a205454a632e4b5190e15e75c-2022-09-06.02-12-44
  ECR_REGISTRY: 696811202438.dkr.ecr.us-west-2.amazonaws.com
  
permissions:
  contents: read
  id-token: write

jobs:
  tester:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        role-session-name: MovieMatchS3Test
        aws-region: ${{ env.AWS_REGION }}
      
    - name: AWSCopy
      run: |
        aws s3 cp ./Docker/docker-compose.deploy.yml s3://deploy-instructions/$ECR_REPOSITORY/docker-compose.yml
    
    - name: SSM Send Command
      env:
        DOC_VERSION: "$LATEST"
      run: | 
        aws ssm send-command \
          --document-name "Update_Project" \
          --document-version "$DOC_VERSION" \
          --targets '[{"Key":"InstanceIds","Values":["${{ secrets.AWS_MOVIEMATCH_EC2_INSTANCE_ID }}"]}]' \
          --parameters '{ "ecrRegistry":["$ECR_REGISTRY"], "repoName":["$ECR_REPOSITORY"], "imageTag":["$IMAGE_TAG"]}' \
          --timeout-seconds 600 \
          --max-concurrency "50" \
          --max-errors "0" \
          --region us-west-2
