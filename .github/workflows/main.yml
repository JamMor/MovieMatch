name: S3 Test

on:
  workflow_dispatch:

jobs:
  tester:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: AWSThere
      run: aws --version
    
    - name: Echo directory
      run: echo $(ls)
      
    - name: AWSCopy
      run: aws aws s3 cp ./Docker/docker-compose.yml s3://deploy-instructions/compose-files/docker-compose.yml
    
    #- name: AWSSync
    #  run: aws aws s3 cp ./Docker/docker-compose.prod.yml s3://my_bucket/compose-files/docker-compose.prod.yml
